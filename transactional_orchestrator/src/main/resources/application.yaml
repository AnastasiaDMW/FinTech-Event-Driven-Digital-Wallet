spring:
  application:
    name: transactional-orchestrator
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/transactional_orchestrator
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    listener:
      ack-mode: record
account_service:
  url: ${ACCOUNT_URI}
gateway:
  public-key: ${GATEWAY_PUBLIC_KEY}

kafka-consumer:
  bootstrap-servers: ${BOOTSTRAP_SERVERS}
  group-id: transactional-orchestrator
  auto-offset-reset: earliest
  trusted-packages: com.example.transactional_orchestrator.dto

eureka:
  client:
    service-url:
      defaultZone: ${URI_EUREKA}
    register-with-eureka: true
    fetch-registry: true

  instance:
    instance-id: ${spring.application.name}:${HOSTNAME}