spring:
  application:
    name: balance
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/balance
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    listener:
      ack-mode: record

kafka-consumer:
  bootstrap-servers: ${BOOTSTRAP_SERVERS}
  group-id: balance
  auto-offset-reset: earliest
  trusted-packages: com.example.balance.dto