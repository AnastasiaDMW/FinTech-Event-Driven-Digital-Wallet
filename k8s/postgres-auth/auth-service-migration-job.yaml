apiVersion: batch/v1
kind: Job
metadata:
  name: auth-service-migrations
  namespace: microservices
spec:
  template:
    spec:
      restartPolicy: Never
      initContainers:
      - name: wait-for-postgres
        image: postgres:16-alpine
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-auth-secret
              key: POSTGRES_PASSWORD
        command:
        - sh
        - -c
        - |
          until pg_isready -h postgres-auth-service -U postgres -d auth_service_dev; do
            echo "Waiting for PostgreSQL to be ready..."
            sleep 3
          done
          echo "PostgreSQL is ready!"
      
      containers:
      - name: migrator
        image: postgres:16-alpine
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-auth-secret
              key: POSTGRES_PASSWORD
        command:
        - sh
        - -c
        - |
          echo "Running database migrations..."
          
          psql -h postgres-auth-service -U postgres -d auth_service_dev -f /config/init.sql
          
          if [ $? -eq 0 ]; then
            echo "Migrations completed successfully!"
            psql -h postgres-auth-service -U postgres -d auth_service_dev -c "\dt users"
          else
            echo "Migrations failed!"
            exit 1
          fi
        volumeMounts:
        - name: config
          mountPath: /config
      
      volumes:
      - name: config
        configMap:
          name: postgres-auth-config
      
      resources:
        requests:
          memory: "64Mi"
          cpu: "100m"
        limits:
          memory: "128Mi"
          cpu: "200m"
  
  backoffLimit: 5
  ttlSecondsAfterFinished: 300