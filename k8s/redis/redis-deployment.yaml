apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  namespace: microservices
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:8.0-alpine  # Используем alpine версию для меньшего размера
        ports:
        - containerPort: 6379
          name: redis
          protocol: TCP
        
        # Ресурсы (из вашего docker-compose: mem_limit: 64m, cpus: 0.01)
        resources:
          requests:
            memory: "64Mi"
            cpu: "10m"      # 0.01 CPU = 10m
          limits:
            memory: "128Mi"  # Немного больше для безопасности
            cpu: "50m"
        
        # Команда запуска с конфиг файлом
        command:
        - redis-server
        - /usr/local/etc/redis/redis.conf
        - --requirepass
        - $(REDIS_PASSWORD)  # Пароль для default пользователя (опционально)
        
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: AUTH_PASSWORD
        
        # Монтирование конфигурации и данных
        volumeMounts:
        - name: redis-configmap
          mountPath: /usr/local/etc/redis
        - name: redis-storage
          mountPath: /data
        - name: redis-acl
          mountPath: /usr/local/etc/redis/users.acl
          subPath: users.acl
        
        # Проверка здоровья
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
      
      volumes:
      - name: redis-configmap
        configMap:
          name: redis-configmap
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc
      - name: redis-acl
        secret:
          secretName: redis-secret
          items:
          - key: users.acl
            path: users.acl