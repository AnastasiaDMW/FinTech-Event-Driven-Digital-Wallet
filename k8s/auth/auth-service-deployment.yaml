apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: auth-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
        
        env:
        # Redis подключение с пользователем auth
        - name: REDIS_ADDR
          value: "redis-service:6379"
        - name: REDIS_USERNAME
          value: "auth"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: AUTH_PASSWORD
        
        # PostgreSQL подключение
        - name: DB_HOST
          value: "postgres-auth-service"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "1234"
        - name: DB_NAME
          value: "auth_service_dev"
        
        # JWT ключи
        - name: PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: auth-service-secret
              key: PRIVATE_KEY
        - name: PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: auth-service-secret
              key: PUBLIC_KEY
        
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        
        volumeMounts:
        - name: config
          mountPath: /app/config
      
      volumes:
      - name: config
        configMap:
          name: auth-service-config