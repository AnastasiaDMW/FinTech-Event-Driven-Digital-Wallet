apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-3
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
      broker-id: "3"
  template:
    metadata:
      labels:
        app: kafka
        broker-id: "3"
    spec:
      containers:
      - name: kafka
        image: confluentinc/cp-kafka:7.6.0
        ports:
        - containerPort: 9092
          name: broker
        - containerPort: 9093
          name: controller
        - containerPort: 19092
          name: external
        
        env:
        - name: KAFKA_NODE_ID
          value: "3"
        
        - name: KAFKA_HEAP_OPTS
          value: "-Xms256m -Xmx256m"
        
        - name: KAFKA_PROCESS_ROLES
          value: "broker,controller"
        
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: "1@kafka-1.microservices.svc.cluster.local:9093,2@kafka-2.microservices.svc.cluster.local:9093,3@kafka-3.microservices.svc.cluster.local:9093"
        
        - name: KAFKA_LISTENERS
          value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:19092"
        
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://kafka-3.microservices.svc.cluster.local:9092,EXTERNAL://localhost:39092"
        
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
        
        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: "CONTROLLER"
        
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "PLAINTEXT"
        
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "3"
        
        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: "3"
        
        - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
          value: "2"
        
        - name: CLUSTER_ID
          value: "MkU3OEVBNTcwNTJENDM2Qk"
        
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        volumeMounts:
        - name: data
          mountPath: /var/lib/kafka/data
      
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: kafka-3-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-3-pvc
  namespace: microservices
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-3
  namespace: microservices
spec:
  selector:
    app: kafka
    broker-id: "3"
  ports:
  - name: broker
    port: 9092
    targetPort: 9092
  - name: controller
    port: 9093
    targetPort: 9093
  type: ClusterIP