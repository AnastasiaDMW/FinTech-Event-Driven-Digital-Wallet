apiVersion: apps/v1
kind: Deployment
metadata:
  name: akhq
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: akhq
  template:
    metadata:
      labels:
        app: akhq
    spec:
      containers:
      - name: akhq
        image: tchiotludo/akhq:latest
        ports:
        - containerPort: 8080
          name: web
        
        env:
        - name: AKHQ_CONFIGURATION
          value: |
            akhq:
              connections:
                prod-cluster:
                  properties:
                    bootstrap.servers: "kafka-0.kafka-headless:9092,kafka-1.kafka-headless:9092,kafka-2.kafka-headless:9092"
                  connect:
                    - name: connect
                      url: "http://kafka-connect:8083"
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: akhq
  namespace: microservices
spec:
  selector:
    app: akhq
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP